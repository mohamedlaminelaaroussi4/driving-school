<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>السؤال المباشر</title>
    <style>
        /* ... (same styles as before, plus debug-info) ... */
        .debug-info { font-size: 0.7rem; color: #999; margin-top: 1rem; padding: 0.5rem; background: #f1f5f9; border-radius: 4px; white-space: pre-wrap; word-break: break-all; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- ... same HTML ... -->
            <div class="debug-info" id="debugInfo">⏳ جاري التحميل...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <script>
        (function() {
            const API_BASE = 'https://driving-school-ad4.pages.dev/api';
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session');
            console.log('[Q] Session ID:', sessionId);

            let deviceFingerprint = '';
            const debugEl = document.getElementById('debugInfo');

            function debug(msg) {
                debugEl.textContent = msg + '\n' + debugEl.textContent;
                console.log('[Q]', msg);
            }

            async function getFingerprint() {
                try {
                    const fp = await FingerprintJS.load();
                    const result = await fp.get();
                    deviceFingerprint = result.visitorId;
                    debug('Fingerprint: ' + deviceFingerprint);
                } catch (e) {
                    deviceFingerprint = 'unavailable';
                    debug('Fingerprint error: ' + e.message);
                }
            }
            getFingerprint();

            async function getIP() {
                try {
                    const res = await fetch('https://api.ipify.org?format=json');
                    const data = await res.json();
                    debug('IP: ' + data.ip);
                    return data.ip;
                } catch (e) {
                    debug('IP error: ' + e.message);
                    return 'unknown';
                }
            }

            if (!sessionId) {
                document.getElementById('loginDiv').innerHTML = '<div class="message error">⚠️ رابط غير صالح. يرجى مسح الكود من الشاشة مجدداً.</div>';
                document.getElementById('enterBtn').disabled = true;
                debug('Invalid session ID');
                return;
            }
            document.getElementById('displaySessionId').textContent = sessionId;
            debug('Session ID: ' + sessionId);

            // ─── Validation (same as before) ──────────────────────────────
            const nameInput = document.getElementById('nameInput');
            const phoneInput = document.getElementById('phoneInput');
            const studentIdInput = document.getElementById('studentIdInput');
            const consentCheck = document.getElementById('consentCheck');
            const enterBtn = document.getElementById('enterBtn');
            const nameError = document.getElementById('nameError');
            const phoneError = document.getElementById('phoneError');
            const studentIdError = document.getElementById('studentIdError');
            const validationStatus = document.getElementById('validationStatus');

            function validateName() {
                const val = nameInput.value.trim();
                const regex = /^[a-zA-Z\s\-]+$/;
                const isValid = regex.test(val) && val.length >= 6;
                nameInput.classList.toggle('valid', isValid);
                nameInput.classList.toggle('invalid', !isValid && val.length > 0);
                nameError.style.display = (!isValid && val.length > 0) ? 'block' : 'none';
                return isValid;
            }

            function validatePhone() {
                const val = phoneInput.value.trim();
                const regex = /^(06|07)\d{8}$/;
                const isValid = regex.test(val);
                phoneInput.classList.toggle('valid', isValid);
                phoneInput.classList.toggle('invalid', !isValid && val.length > 0);
                phoneError.style.display = (!isValid && val.length > 0) ? 'block' : 'none';
                return isValid;
            }

            function validateStudentId() {
                const val = studentIdInput.value.trim();
                if (val === '') {
                    studentIdInput.classList.remove('valid', 'invalid');
                    studentIdError.style.display = 'none';
                    return true;
                }
                const isValid = val.length >= 2;
                studentIdInput.classList.toggle('valid', isValid);
                studentIdInput.classList.toggle('invalid', !isValid);
                studentIdError.style.display = (!isValid) ? 'block' : 'none';
                return isValid;
            }

            function updateUI() {
                const nameOk = validateName();
                const phoneOk = validatePhone();
                const studentIdOk = validateStudentId();
                const consentOk = consentCheck.checked;
                const allOk = nameOk && phoneOk && studentIdOk && consentOk;

                if (allOk) {
                    validationStatus.textContent = '✅ جميع الحقول صحيحة، يمكنك الدخول';
                    validationStatus.className = 'validation-status ok';
                    enterBtn.disabled = false;
                    enterBtn.classList.add('ready');
                } else {
                    let msg = '⚠️ يرجى تصحيح: ';
                    const issues = [];
                    if (!nameOk) issues.push('الاسم (أحرف لاتينية، 6 أحرف على الأقل)');
                    if (!phoneOk) issues.push('رقم الهاتف (06/07 + 8 أرقام)');
                    if (!studentIdOk) issues.push('رقم التسجيل (2 أحرف على الأقل)');
                    if (!consentOk) issues.push('الموافقة على جمع البيانات');
                    validationStatus.textContent = msg + issues.join('، ');
                    validationStatus.className = 'validation-status fail';
                    enterBtn.disabled = true;
                    enterBtn.classList.remove('ready');
                }
            }

            nameInput.addEventListener('input', updateUI);
            phoneInput.addEventListener('input', updateUI);
            studentIdInput.addEventListener('input', updateUI);
            consentCheck.addEventListener('change', updateUI);
            updateUI();

            // ─── Enter ────────────────────────────────────────────────────
            document.getElementById('enterBtn').addEventListener('click', async function() {
                const name = nameInput.value.trim();
                const phone = phoneInput.value.trim();
                const studentId = studentIdInput.value.trim();

                if (!validateName() || !validatePhone() || !validateStudentId()) {
                    alert('يرجى تصحيح البيانات قبل المتابعة.');
                    return;
                }

                localStorage.setItem('studentName', name);
                localStorage.setItem('studentPhone', phone);
                if (studentId) localStorage.setItem('studentId', studentId);
                else localStorage.removeItem('studentId');

                document.getElementById('loginDiv').style.display = 'none';
                document.getElementById('waitingDiv').style.display = 'block';
                debug('Entered waiting mode');
                startPolling();
            });

            // ─── Polling ────────────────────────────────────────────────────
            let pollInterval = null;
            let lastStartTime = null;
            let timerInterval = null;
            let remainingSeconds = 0;
            let currentAnswer = [];

            function startPolling() {
                if (pollInterval) clearInterval(pollInterval);
                pollInterval = setInterval(async () => {
                    try {
                        const response = await fetch(`${API_BASE}/questions/current?session=${sessionId}`);
                        if (!response.ok) {
                            debug('Poll response not OK: ' + response.status);
                            return;
                        }
                        const data = await response.json();
                        debug('Poll response: ' + JSON.stringify(data));

                        if (data.status === 'active') {
                            const newStartTime = data.start_time;
                            if (!lastStartTime || lastStartTime !== newStartTime) {
                                lastStartTime = newStartTime;
                                if (document.getElementById('questionDiv').style.display === 'none') {
                                    document.getElementById('waitingDiv').style.display = 'none';
                                    document.getElementById('questionDiv').style.display = 'block';
                                    debug('Showing question');
                                } else {
                                    resetUIForNewQuestion(data.duration || 60);
                                    debug('Resetting for new question');
                                }
                                if (!timerInterval || remainingSeconds <= 0) {
                                    startTimer(data.duration || 60);
                                }
                            }
                        } else {
                            debug('Status not active: ' + data.status);
                        }
                    } catch (e) {
                        debug('Poll error: ' + e.message);
                        console.warn('Polling error:', e);
                    }
                }, 2000);
            }

            // ─── Timer ──────────────────────────────────────────────────────
            function startTimer(duration) {
                if (timerInterval) clearInterval(timerInterval);
                remainingSeconds = duration;
                const timerDisplay = document.getElementById('timerDisplay');
                timerDisplay.textContent = remainingSeconds;
                timerDisplay.classList.remove('warning');
                timerInterval = setInterval(() => {
                    remainingSeconds--;
                    timerDisplay.textContent = remainingSeconds;
                    if (remainingSeconds <= 10) timerDisplay.classList.add('warning');
                    if (remainingSeconds <= 0) {
                        clearInterval(timerInterval);
                        document.getElementById('submitBtn').disabled = true;
                        const resultMessage = document.getElementById('resultMessage');
                        resultMessage.style.display = 'block';
                        resultMessage.className = 'message error';
                        resultMessage.textContent = '⏰ انتهى الوقت!';
                    }
                }, 1000);
            }

            function resetUIForNewQuestion(duration) {
                currentAnswer = [];
                document.getElementById('displayAnswer').textContent = '...';
                document.getElementById('resultMessage').style.display = 'none';
                document.getElementById('submitBtn').disabled = false;
                startTimer(duration);
            }

            // ─── Answer functions ──────────────────────────────────────────
            function addNumber(num) {
                if (currentAnswer.length < 4) {
                    currentAnswer.push(num);
                    document.getElementById('displayAnswer').textContent = currentAnswer.length === 0 ? '...' : currentAnswer.join(' , ');
                }
            }

            function removeLast() {
                currentAnswer.pop();
                document.getElementById('displayAnswer').textContent = currentAnswer.length === 0 ? '...' : currentAnswer.join(' , ');
            }

            // ─── Submit ─────────────────────────────────────────────────────
            document.getElementById('submitBtn').addEventListener('click', async function() {
                if (currentAnswer.length === 0) {
                    alert('الرجاء اختيار رقم واحد على الأقل');
                    return;
                }
                this.disabled = true;
                this.textContent = '⏳ جاري الإرسال...';

                const answerStr = currentAnswer.join(',');
                const name = localStorage.getItem('studentName');
                const phone = localStorage.getItem('studentPhone');
                const studentId = localStorage.getItem('studentId') || '';
                const ipAddress = await getIP();

                try {
                    const response = await fetch(`${API_BASE}/questions/submit`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            session_id: sessionId,
                            full_name: name,
                            phone: phone,
                            student_id: studentId,
                            answer: answerStr,
                            ip_address: ipAddress,
                            user_agent: navigator.userAgent,
                            device_fingerprint: deviceFingerprint
                        })
                    });
                    const result = await response.json();
                    debug('Submit response: ' + JSON.stringify(result));
                    if (result.success) {
                        clearInterval(timerInterval);
                        document.getElementById('questionDiv').style.display = 'none';
                        document.getElementById('resultDiv').style.display = 'block';
                        const finalMessage = document.getElementById('finalMessage');
                        finalMessage.className = 'message success';
                        finalMessage.textContent = `✅ تم تأكيد إجابتك: ( ${answerStr} )`;
                    } else {
                        alert('خطأ: ' + (result.error || 'حدث خطأ أثناء الإرسال'));
                        this.disabled = false;
                        this.textContent = '✅ تأكيد الإجابة';
                    }
                } catch (error) {
                    alert('خطأ في الاتصال: ' + error.message);
                    this.disabled = false;
                    this.textContent = '✅ تأكيد الإجابة';
                }
            });
        })();
    </script>
</body>
</html>
