<div class="card" id="startForm">
            <h3>بدء سؤال جديد</h3>
            <div class="form-group">
                <label>الإجابة الصحيحة (يمكنك كتابة 1,2,3)</label>
                <input type="text" id="correctAnswer" placeholder="مثال: 1,3 أو 2" dir="ltr" />
            </div>
            <div class="form-group">
                <label>مدة الإجابة (ثانية)</label>
                <input type="number" id="duration" value="60" />
            </div>
            <button class="btn btn-primary" id="startQuestionBtn">▶️ بدء السؤال</button>
        </div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="../static/js/data.js"></script>
    <script>
        console.log('Questions page loaded - API_BASE:', typeof API_BASE !== 'undefined' ? API_BASE : 'NOT DEFINED');

        let currentSessionId = null;
        let questionLink = '';
        let refreshInterval = null;
        let currentCorrectAnswerArray = []; // لتخزين الإجابة كمصفوفة للمقارنة اللاحقة

        document.getElementById('startQuestionBtn').addEventListener('click', async function() {
            const rawAnswer = document.getElementById('correctAnswer').value.trim();
            const duration = parseInt(document.getElementById('duration').value) || 60;
            
            if (!rawAnswer) { alert('الرجاء إدخال الإجابة الصحيحة'); return; }

            // تحويل النص المدخل (مثل "1, 3") إلى مصفوفة أرقام [1, 3] وتجاهل الفراغات
            currentCorrectAnswerArray = rawAnswer.split(',')
                .map(n => parseInt(n.trim()))
                .filter(n => !isNaN(n))
                .sort((a, b) => a - b);

            if (currentCorrectAnswerArray.length === 0) {
                alert('الرجاء إدخال أرقام صحيحة (مثال: 1,3)'); return;
            }

            try {
                const response = await fetch(`${API_BASE}/questions/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // نرسل الإجابة كمصفوفة للسيرفر
                    body: JSON.stringify({ question: "سؤال صوري", correct_answer: currentCorrectAnswerArray, duration })
                });
                const data = await response.json();
                if (data.success) {
                    currentSessionId = data.session_id;
                    const baseUrl = 'https://driving-school.mohamedlaminelaaroussi4.workers.dev';
                    questionLink = `${baseUrl}/question.html?session=${currentSessionId}`;
                    
                    document.getElementById('sessionCode').textContent = currentSessionId;
                    document.getElementById('sessionInfo').style.display = 'block';
                    document.getElementById('startForm').style.display = 'none';
                    
                    document.getElementById('qrContainer').innerHTML = '';
                    new QRCode(document.getElementById('qrContainer'), { 
                        text: questionLink, width: 220, height: 220, colorDark : "#1a4d2e", colorLight : "#ffffff"
                    });
                    
                    if (refreshInterval) clearInterval(refreshInterval);
                    refreshInterval = setInterval(fetchResults, 3000);
                    await fetchResults();
                } else { alert('خطأ: ' + (data.error || 'حدث خطأ')); }
            } catch (error) { alert('خطأ في الاتصال: ' + error.message); }
        });

        document.getElementById('endQuestionBtn').addEventListener('click', function() {
            if (confirm('هل أنت متأكد من إنهاء هذا السؤال؟')) {
                if (refreshInterval) clearInterval(refreshInterval);
                refreshInterval = null;
                document.getElementById('sessionInfo').style.display = 'none';
                document.getElementById('startForm').style.display = 'block';
                currentSessionId = null;
                document.getElementById('resultsBody').innerHTML = '';
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('totalAnswers').textContent = '0';
                document.getElementById('correctAnswers').textContent = '0';
                document.getElementById('wrongAnswers').textContent = '0';
                document.getElementById('correctAnswer').value = '';
            }
        });

        async function fetchResults() {
            if (!currentSessionId) return;
            try {
                const response = await fetch(`${API_BASE}/questions/session/${currentSessionId}/results`);
                const data = await response.json();
                if (data.error) { console.error(data.error); return; }
                renderResults(data);
            } catch (e) { console.error('Error fetching results:', e); }
        }

        function renderResults(data) {
            const stats = data.stats;
            const answers = stats.answers || [];
            
            // تحويل الإجابة الصحيحة القادمة من السيرفر إلى نص للمقارنة
            const correctArr = Array.isArray(data.session.correct_answer) ? data.session.correct_answer : currentCorrectAnswerArray;
            const correctStr = correctArr.sort((a, b) => a - b).join(', ');

            document.getElementById('totalAnswers').textContent = stats.total;
            document.getElementById('correctAnswers').textContent = stats.correct;
            document.getElementById('wrongAnswers').textContent = stats.wrong;
            
            const tbody = document.getElementById('resultsBody');
            const empty = document.getElementById('emptyState');
            if (answers.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
            empty.style.display = 'none';
            
            tbody.innerHTML = answers.map((a, idx) => {
                // التأكد من أن إجابة الطالب مصفوفة قبل مقارنتها
                const studentAnsArr = Array.isArray(a.answer) ? a.answer : String(a.answer).split(',').map(n => parseInt(n.trim()));
                const studentStr = studentAnsArr.sort((a,b) => a - b).join(', ');
                
                const isCorrect = studentStr === correctStr;
                return `<tr>
                    <td>${idx+1}</td>
                    <td><strong>${a.full_name}</strong></td>
                    <td dir="ltr">${a.phone}</td>
                    <td dir="ltr" style="font-size:1.2rem; font-weight:bold;">${studentStr}</td>
                    <td><span class="status-badge ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✅ صحيح' : '❌ خاطئ'}</span></td>
                </tr>`;
            }).join('');
        }

        // دوال النسخ والواتساب بقيت كما هي...
        function copyLink() { /* ... */ }
        function shareWhatsApp() { /* ... */ }
    </script>
